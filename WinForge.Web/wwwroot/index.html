<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WinForge — Window & Door Manufacturing Platform</title>
    <base href="/" />

    <!-- MudBlazor -->
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" rel="stylesheet" />
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />

    <style>
        body { margin: 0; font-family: 'Roboto', sans-serif; background: #F5F7FA; }
        #app { min-height: 100vh; }
    </style>
</head>
<body>
    <div id="app">
        <div style="display:flex;justify-content:center;align-items:center;height:100vh;flex-direction:column;gap:16px;">
            <div style="width:48px;height:48px;border:4px solid #1E3A5F;border-top-color:transparent;border-radius:50%;animation:spin 1s linear infinite;"></div>
            <p style="color:#1E3A5F;font-weight:500;">Loading WinForge...</p>
        </div>
        <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
    </div>

    <script src="_framework/blazor.webassembly.js"></script>
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>
</body>
</html>
